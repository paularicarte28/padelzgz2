version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: padelzgz-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=padelzgz_super_secret_2024
      - JWT_EXPIRES_IN=24h
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - padelzgz_db:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: padelzgz-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  padelzgz_db:
